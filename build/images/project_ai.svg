<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0F172A"/>
  <!-- AI Neural Ring -->
  <defs>
    <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#2563EB" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="400" cy="250" r="220" fill="url(#ringGrad)"/>
  
  <!-- Outer glowing rings -->
  <circle cx="400" cy="250" r="160" fill="none" stroke="#06B6D4" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5 15"/>
  <circle cx="400" cy="250" r="120" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="#A855F7" stroke-width="2" stroke-opacity="0.6" stroke-dasharray="10 5"/>
  <circle cx="400" cy="250" r="30" fill="#06B6D4" filter="drop-shadow(0 0 15px #06B6D4)"/>

  <!-- Connections & nodes -->
  <line x1="400" y1="250" x2="280" y2="150" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="400" y1="250" x2="520" y2="150" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="400" y1="250" x2="300" y2="350" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="400" y1="250" x2="500" y2="350" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"/>
  
  <circle cx="280" cy="150" r="8" fill="#2563EB" filter="drop-shadow(0 0 8px #2563EB)"/>
  <circle cx="520" cy="150" r="10" fill="#06B6D4" filter="drop-shadow(0 0 10px #06B6D4)"/>
  <circle cx="300" cy="350" r="6" fill="#A855F7" filter="drop-shadow(0 0 6px #A855F7)"/>
  <circle cx="500" cy="350" r="8" fill="#EC4899" filter="drop-shadow(0 0 8px #EC4899)"/>

  <!-- Code elements on screen -->
  <rect x="50" y="50" width="180" height="100" rx="8" fill="#1E293B" fill-opacity="0.6" stroke="#334155"/>
  <rect x="70" y="70" width="80" height="8" rx="2" fill="#06B6D4"/>
  <rect x="70" y="85" width="120" height="6" rx="2" fill="#94A3B8"/>
  <rect x="70" y="95" width="100" height="6" rx="2" fill="#94A3B8"/>
  <rect x="70" y="115" width="40" height="12" rx="3" fill="#2563EB"/>

  <rect x="570" y="320" width="180" height="110" rx="8" fill="#1E293B" fill-opacity="0.6" stroke="#334155"/>
  <rect x="590" y="340" width="100" height="8" rx="2" fill="#A855F7"/>
  <rect x="590" y="355" width="130" height="6" rx="2" fill="#94A3B8"/>
  <rect x="590" y="365" width="90" height="6" rx="2" fill="#94A3B8"/>
  <rect x="590" y="380" width="120" height="6" rx="2" fill="#94A3B8"/>
</svg>
