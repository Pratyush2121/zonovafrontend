<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="linear-gradient(135deg, #0F172A, #020617)"/>
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#bgGrad2)"/>

  <!-- AI chip icon -->
  <g transform="translate(180, 50)">
    <circle cx="120" cy="110" r="80" fill="#0891B2" fill-opacity="0.15" filter="blur(20px)"/>
    <!-- CPU base -->
    <rect x="70" y="60" width="100" height="100" rx="16" fill="#1E293B" stroke="#06B6D4" stroke-width="4"/>
    <rect x="90" y="80" width="60" height="60" rx="8" fill="#06B6D4" fill-opacity="0.8"/>
    <!-- Pins -->
    <rect x="60" y="80" width="10" height="6" rx="2" fill="#06B6D4"/>
    <rect x="60" y="100" width="10" height="6" rx="2" fill="#06B6D4"/>
    <rect x="60" y="120" width="10" height="6" rx="2" fill="#06B6D4"/>
    
    <rect x="170" y="80" width="10" height="6" rx="2" fill="#06B6D4"/>
    <rect x="170" y="100" width="10" height="6" rx="2" fill="#06B6D4"/>
    <rect x="170" y="120" width="10" height="6" rx="2" fill="#06B6D4"/>

    <rect x="80" y="50" width="6" height="10" rx="2" fill="#06B6D4"/>
    <rect x="100" y="50" width="6" height="10" rx="2" fill="#06B6D4"/>
    <rect x="120" y="50" width="6" height="10" rx="2" fill="#06B6D4"/>

    <rect x="80" y="160" width="6" height="10" rx="2" fill="#06B6D4"/>
    <rect x="100" y="160" width="6" height="10" rx="2" fill="#06B6D4"/>
    <rect x="120" y="160" width="6" height="10" rx="2" fill="#06B6D4"/>
    <!-- Neural Network overlay -->
    <circle cx="120" cy="110" r="15" fill="#FFFFFF"/>
  </g>
</svg>
