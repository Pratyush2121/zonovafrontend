<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#F8FAFC"/>
  <!-- Phone Shell -->
  <rect x="280" y="30" width="240" height="440" rx="36" fill="#0F172A" filter="drop-shadow(0 10px 25px rgba(0,0,0,0.15))"/>
  <!-- Phone Screen -->
  <rect x="290" y="45" width="220" height="410" rx="28" fill="#FFFFFF"/>
  <!-- Notch -->
  <rect x="370" y="45" width="60" height="15" rx="7" fill="#0F172A"/>
  <!-- App Header -->
  <circle cx="320" cy="85" r="15" fill="#2563EB"/>
  <rect x="345" y="77" width="80" height="16" rx="4" fill="#E2E8F0"/>
  <!-- Credit Card Visual -->
  <rect x="305" y="120" width="190" height="110" rx="12" fill="linear-gradient(135deg, #2563EB, #06B6D4)"/>
  <path d="M305 120 H495 V230 H305 Z" fill="none"/>
  <!-- Gradient for Card -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect x="305" y="120" width="190" height="110" rx="12" fill="url(#cardGrad)"/>
  <circle cx="450" cy="150" r="15" fill="#FFFFFF" fill-opacity="0.2"/>
  <circle cx="465" cy="150" r="15" fill="#FFFFFF" fill-opacity="0.3"/>
  <rect x="325" y="200" width="100" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.8"/>
  <!-- List Items -->
  <rect x="305" y="250" width="190" height="45" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="330" cy="272" r="10" fill="#ECFDF5"/>
  <rect x="350" y="265" width="80" height="10" rx="2" fill="#94A3B8"/>
  <rect x="350" y="280" width="50" height="6" rx="2" fill="#CBD5E1"/>
  
  <rect x="305" y="305" width="190" height="45" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="330" cy="327" r="10" fill="#FEF2F2"/>
  <rect x="350" y="320" width="90" height="10" rx="2" fill="#94A3B8"/>
  <rect x="350" y="335" width="40" height="6" rx="2" fill="#CBD5E1"/>

  <rect x="305" y="360" width="190" height="45" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <circle cx="330" cy="382" r="10" fill="#EFF6FF"/>
  <rect x="350" y="375" width="70" height="10" rx="2" fill="#94A3B8"/>
  <rect x="350" y="390" width="60" height="6" rx="2" fill="#CBD5E1"/>

  <!-- Home Indicator -->
  <rect x="360" y="445" width="80" height="4" rx="2" fill="#E2E8F0"/>
</svg>
