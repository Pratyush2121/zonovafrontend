<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="linear-gradient(135deg, #1E293B, #0F172A)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#bgGrad)"/>
  
  <!-- Lightbulb and checklist -->
  <g transform="translate(180, 50)">
    <!-- Glow -->
    <circle cx="120" cy="110" r="70" fill="#2563EB" fill-opacity="0.2" filter="blur(20px)"/>
    <!-- bulb shape -->
    <path d="M120 40 C90 40 70 60 70 90 C70 110 85 125 95 135 L95 155 C95 160 100 165 105 165 H135 C140 165 145 160 145 155 L145 135 C155 125 170 110 170 90 C170 60 150 40 120 40 Z" fill="#2563EB"/>
    <!-- filament -->
    <path d="M110 90 L120 70 L130 90 Z" stroke="#06B6D4" stroke-width="4" fill="none"/>
    <rect x="105" y="170" width="30" height="8" rx="2" fill="#94A3B8"/>
    <rect x="110" y="182" width="20" height="6" rx="2" fill="#CBD5E1"/>
  </g>
  
  <!-- Graph elements floating -->
  <circle cx="80" cy="80" r="6" fill="#06B6D4"/>
  <circle cx="500" cy="280" r="10" fill="#3B82F6"/>
  <circle cx="480" cy="90" r="8" fill="#EC4899"/>
</svg>
