<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <rect width="600" height="350" fill="linear-gradient(135deg, #1E1B4B, #0F172A)"/>
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="350" fill="url(#bgGrad3)"/>

  <!-- Rocket launch icon -->
  <g transform="translate(180, 40)">
    <circle cx="120" cy="110" r="80" fill="#EC4899" fill-opacity="0.15" filter="blur(20px)"/>
    <!-- Flame -->
    <path d="M110 160 Q120 200 130 160 T120 180 Z" fill="#F59E0B"/>
    <!-- Rocket body -->
    <path d="M120 40 C105 70 100 100 100 140 H140 C140 100 135 70 120 40 Z" fill="#FFFFFF"/>
    <!-- Fins -->
    <path d="M100 120 L85 140 H100 Z" fill="#EC4899"/>
    <path d="M140 120 L155 140 H140 Z" fill="#EC4899"/>
    <!-- Window -->
    <circle cx="120" cy="80" r="10" fill="#38BDF8"/>
  </g>
</svg>
