<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#F8FAFC"/>
  <!-- App Shell -->
  <rect x="100" y="50" width="600" height="400" rx="12" fill="#FFFFFF" filter="drop-shadow(0 10px 20px rgba(0,0,0,0.05))" stroke="#E2E8F0"/>
  <!-- Navbar inside app -->
  <rect x="100" y="50" width="600" height="55" fill="#FFFFFF" rx="12" stroke="#F1F5F9" stroke-width="2"/>
  <circle cx="135" cy="77" r="10" fill="#A855F7"/>
  <rect x="160" y="70" width="80" height="14" rx="4" fill="#E2E8F0"/>
  <rect x="520" y="65" width="60" height="24" rx="6" fill="#F3E8FF"/>
  <rect x="600" y="65" width="80" height="24" rx="6" fill="#A855F7"/>
  
  <!-- Content -->
  <!-- Left Side: Courses List -->
  <rect x="120" y="130" width="180" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="135" y="145" width="40" height="40" rx="6" fill="#E0F2FE"/>
  <rect x="190" y="150" width="80" height="12" rx="3" fill="#0284C7"/>
  <rect x="190" y="170" width="50" height="8" rx="2" fill="#CBD5E1"/>

  <rect x="120" y="215" width="180" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="135" y="230" width="40" height="40" rx="6" fill="#FEE2E2"/>
  <rect x="190" y="235" width="70" height="12" rx="3" fill="#DC2626"/>
  <rect x="190" y="255" width="60" height="8" rx="2" fill="#CBD5E1"/>

  <rect x="120" y="300" width="180" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="135" y="315" width="40" height="40" rx="6" fill="#FEF3C7"/>
  <rect x="190" y="320" width="90" height="12" rx="3" fill="#D97706"/>
  <rect x="190" y="340" width="40" height="8" rx="2" fill="#CBD5E1"/>

  <!-- Right Side: Course Video Player -->
  <rect x="320" y="130" width="360" height="200" rx="8" fill="#0F172A"/>
  <polygon points="480,210 520,230 480,250" fill="#FFFFFF"/>
  <circle cx="500" cy="230" r="30" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <rect x="320" y="345" width="200" height="14" rx="4" fill="#1E293B"/>
  <rect x="320" y="365" width="360" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="320" y="365" width="220" height="8" rx="4" fill="#A855F7"/>
  <rect x="320" y="385" width="150" height="8" rx="2" fill="#94A3B8"/>
</svg>
