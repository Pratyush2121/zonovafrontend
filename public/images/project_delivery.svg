<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#F8FAFC"/>
  <!-- Map Background Simulation -->
  <path d="M 0 100 Q 200 80 400 150 T 800 100" fill="none" stroke="#E2E8F0" stroke-width="40"/>
  <path d="M 100 0 Q 180 200 120 400 T 200 500" fill="none" stroke="#E2E8F0" stroke-width="30"/>
  <path d="M 600 0 Q 550 200 650 400 T 580 500" fill="none" stroke="#E2E8F0" stroke-width="35"/>
  <path d="M 0 350 Q 300 380 500 300 T 800 360" fill="none" stroke="#E2E8F0" stroke-width="30"/>

  <!-- Delivery Pin -->
  <g transform="translate(350, 180)">
    <circle cx="50" cy="50" r="40" fill="#2563EB" fill-opacity="0.15"/>
    <circle cx="50" cy="50" r="25" fill="#2563EB" fill-opacity="0.3"/>
    <path d="M50 20 C35 20 25 32 25 45 C25 60 50 80 50 80 C50 80 75 60 75 45 C75 32 65 20 50 20 Z" fill="#2563EB"/>
    <circle cx="50" cy="42" r="10" fill="#FFFFFF"/>
  </g>

  <!-- Route Line -->
  <path d="M 180 80 L 320 120 L 400 230 L 590 320" fill="none" stroke="#06B6D4" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 10"/>
  <circle cx="180" cy="80" r="10" fill="#0F172A"/>
  <circle cx="590" cy="320" r="10" fill="#06B6D4" filter="drop-shadow(0 0 8px #06B6D4)"/>

  <!-- Stats Floating Card -->
  <rect x="50" y="300" width="220" height="150" rx="12" fill="#FFFFFF" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.05))" stroke="#E2E8F0"/>
  <rect x="70" y="325" width="80" height="12" rx="3" fill="#94A3B8"/>
  <rect x="70" y="350" width="120" height="24" rx="4" fill="#0F172A"/>
  <!-- Progress Bar -->
  <rect x="70" y="395" width="180" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="70" y="395" width="130" height="8" rx="4" fill="#2563EB"/>
  <rect x="70" y="415" width="60" height="8" rx="2" fill="#CBD5E1"/>
</svg>
