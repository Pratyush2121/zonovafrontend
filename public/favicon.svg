<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Slate to Velvet Dark Navy -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Metallic Blue Gradient for the ZN letters -->
    <linearGradient id="metallicBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="30%" stop-color="#0EA5E9" />
      <stop offset="70%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>

    <!-- Ice Cyan Gradient for sweeps and highlight edges -->
    <linearGradient id="iceCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="50%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>

    <!-- Silver White Gradient for highlight highlights -->
    <linearGradient id="silverHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1" />
    </linearGradient>

    <!-- Drop Shadow Filter for 3D depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65" />
    </filter>
  </defs>

  <!-- Base Circular Container -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)" />

  <!-- Outer Ring Circular Swooshes (Electric Blue Crescents) -->
  <g filter="url(#shadow)">
    <!-- Top-Right Swoosh -->
    <path d="M 180 80 C 320 80 432 192 432 332 C 432 372 422 408 404 440 C 414 416 420 388 420 360 C 420 240 320 140 200 140 C 192 140 184 140 176 142 C 178 120 180 98 180 80 Z" fill="url(#iceCyan)" />
    
    <!-- Bottom-Left Swoosh -->
    <path d="M 332 432 C 192 432 80 320 80 180 C 80 140 90 104 108 72 C 98 96 92 124 92 152 C 92 272 192 372 312 372 C 320 372 328 372 336 370 C 334 392 332 414 332 432 Z" fill="url(#iceCyan)" />
  </g>

  <!-- Central Intertwined ZN Logo Mark -->
  <g filter="url(#shadow)" transform="translate(130, 126)">
    <!-- The "Z" Path (Sharp geometric style) -->
    <path d="M 0 10 Q 120 10 240 10 L 210 70 L 60 210 L 250 210 C 235 235 220 250 190 250 L 0 250 L 0 230 L 160 90 L 30 90 Z" fill="url(#metallicBlue)" />
    
    <!-- The "N" Path (Nested behind and intertwined) -->
    <path d="M 170 90 L 250 10 L 250 250 C 230 250 210 240 210 220 L 210 120 L 140 220 L 120 200 Z" fill="url(#iceCyan)" />

    <!-- Highlights/Sheen Overlay for premium look -->
    <path d="M 0 10 Q 120 10 240 10 L 225 35 Q 120 35 15 35 Z" fill="url(#silverHighlight)" />
    <path d="M 60 210 L 210 70 L 195 90 L 75 210 Z" fill="#FFFFFF" opacity="0.3" />
  </g>
</svg>